site_name: Patchmatic
site_description: A tool for logging Eurorack patches.
repo_url: https://github.com/pkyme/patchmatic
repo_name: patchmatic

theme:
  name: material
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.sections
    - navigation.top
    - toc.integrate

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide:
    - Module Editor: guide/module-editor.md
    - Rack Editor: guide/rack-editor.md
    - Patch Editor: guide/patch-editor.md
    - Sets: guide/sets.md
    - Export: guide/export.md
  - Reference:
    - Keyboard Shortcuts: reference/keyboard-shortcuts.md
